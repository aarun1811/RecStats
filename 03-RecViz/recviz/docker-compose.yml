services:
  postgres:
    image: postgres:16-alpine
    container_name: recviz-postgres
    environment:
      POSTGRES_USER: recviz
      POSTGRES_PASSWORD: recviz_dev
      POSTGRES_DB: superset_meta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recviz"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recviz-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: recviz-superset
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
