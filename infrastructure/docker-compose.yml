services:
  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    environment:
      - VITE_API_BASE_URL=/api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - recviz
    deploy:
      resources:
        limits:
          memory: 1g

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
    env_file:
      - ../.env
    environment:
      - RECVIZ_SUPERSET_URL=http://superset:8088
      - RECVIZ_REDIS_URL=redis://redis:6379/0
      - RECVIZ_ELASTICSEARCH_URL=http://elasticsearch:9200
      - RECVIZ_DEBUG=true
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - recviz
    deploy:
      resources:
        limits:
          memory: 512m

  superset:
    build:
      context: ../superset
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_CONFIG_PATH=/app/superset_config.py
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-recviz-dev-secret-key}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8088/health\")'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - recviz
    deploy:
      resources:
        limits:
          memory: 2g

  superset-init:
    build:
      context: ../superset
      dockerfile: Dockerfile
    entrypoint: ["/bin/bash", "/app/init_superset.sh"]
    environment:
      - SUPERSET_CONFIG_PATH=/app/superset_config.py
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-recviz-dev-secret-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - recviz
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - recviz
    deploy:
      resources:
        limits:
          memory: 256m

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-superset_meta}
      - POSTGRES_USER=${POSTGRES_USER:-recviz}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-recviz_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recviz} -d ${POSTGRES_DB:-superset_meta}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - recviz
    deploy:
      resources:
        limits:
          memory: 256m

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - recviz
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
  redis-data:

networks:
  recviz:
    driver: bridge
