# Production docker-compose overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:80"
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m
    restart: always

  backend:
    volumes: []
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    environment:
      - RECVIZ_SUPERSET_URL=http://superset:8088
      - RECVIZ_REDIS_URL=redis://redis:6379/0
      - RECVIZ_ELASTICSEARCH_URL=http://elasticsearch:9200
      - RECVIZ_DEBUG=false
    deploy:
      resources:
        limits:
          memory: 1g
    restart: always

  superset:
    deploy:
      resources:
        limits:
          memory: 4g
    restart: always

  superset-init:
    profiles:
      - init

  redis:
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always

  postgres:
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always

  nginx:
    deploy:
      resources:
        limits:
          memory: 128m
    restart: always
